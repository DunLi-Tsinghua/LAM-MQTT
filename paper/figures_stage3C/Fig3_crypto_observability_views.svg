   </g>
   <g id="text_3">
    <text style="fill: #263238; font: 7px 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(168.842578 47.754609)">Full audited metadata</text>
    <text style="fill: #263238; font: 7px 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(152.108203 55.260797)">Upper-bound audited feature set</text>
    <text style="fill: #263238; font: 7px 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(154.063281 62.664609)">no labels or sensitive raw fields</text>
   </g>
   <g id="text_4">
    <text style="fill: #263238; font: 7px 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(157.565469 101.254406)">Broker-side secure metadata</text>
    <text style="fill: #263238; font: 7px 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(136.554531 108.760594)">Broker/flow metadata without raw payload,</text>
    <text style="fill: #263238; font: 7px 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(146.088203 116.348813)">topic, credentials, or client identifiers</text>
   </g>
   <g id="text_5">
    <text style="fill: #263238; font: 7px 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(155.2325 154.899234)">Strict encrypted-flow metadata</text>
    <text style="fill: #263238; font: 7px 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(159.382734 162.385078)">Duration, counts, sizes, IAT,</text>
    <text style="fill: #263238; font: 7px 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif" transform="translate(159.637031 169.891266)">rates, burstiness, TCP flags</text>
   </g>
